name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # The three mechanical gates (AR-13). The SM-6 negative-assertion privacy test
      # lands in Story 1.4 and rides inside `npm test` (vitest) once authored.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
